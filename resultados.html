<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificados e Finalistas - Team Penning</title>
  <script type="module" src="./firebase-config.js"></script>

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --card-bg: #141414;
      --accent-gold: #ffb703;
      --accent-green: #2a9d8f;
      --accent-blue: #0077b6;
      --danger-red: #e76f51;
      --text-light: #f8f9fa;
      --border-color: #282828;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-light); padding: 15px; }

    /* Cabeçalho da Página */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent-gold);
      margin-bottom: 20px;
      background: var(--card-bg);
      padding: 15px 20px;
      border-radius: 8px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      color: var(--accent-gold);
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .select-comp {
      background: #1c1c1c;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    .btn-print {
      background: var(--accent-green);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Seções por Categoria */
    .categoria-secao {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--border-color);
      margin-bottom: 25px;
    }

    .categoria-titulo {
      color: var(--accent-gold);
      font-size: 1.3rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    /* Grids para os Funis (Classificados por Fase) */
    .fases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .fase-card {
      background: #181818;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      padding: 12px;
    }

    .fase-card h3 {
      color: var(--accent-blue);
      font-size: 1.05rem;
      margin-bottom: 10px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    .fase-card.card-final h3 {
      color: var(--accent-gold);
    }

    /* Tabelas */
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
    th { color: var(--accent-gold); background: #121212; }
    tr:nth-child(even) { background-color: #121212; }

    .podio-1 { background-color: rgba(255, 183, 3, 0.25) !important; font-weight: bold; }
    .podio-2 { background-color: rgba(190, 190, 190, 0.18) !important; }
    .podio-3 { background-color: rgba(205, 127, 50, 0.18) !important; }

    .badge-classificado {
      background: var(--accent-green);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .badge-campeao {
      background: var(--accent-gold);
      color: #000;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    /* Impressão */
    @media print {
      body { background: #fff; color: #000; padding: 0; }
      header, .btn-print, .select-comp { display: none !important; }
      .categoria-secao { border: 1px solid #ccc; background: #fff; color: #000; margin-bottom: 10px; }
      .categoria-titulo, th { color: #000; border-color: #000; }
      .fase-card { border: 1px solid #ccc; background: #fff; }
      th, td { border-color: #ddd; color: #000; }
      .podio-1, .podio-2, .podio-3 { background: none !important; }
    }
  </style>
</head>
<body>

  <!-- CABEÇALHO COM SELEÇÃO DE EVENTO -->
  <header>
    <h1 id="txtCompeticaoNome">🏆 CLASSIFICADOS E FINALISTAS DAS ETAPAS</h1>
    
    <div class="header-controls">
      <select id="selectCompeticao" class="select-comp">
        <option value="">Carregando eventos...</option>
      </select>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir Relatório</button>
    </div>
  </header>

  <!-- CONTAINER DE RESULTADOS -->
  <main id="containerResultados">
    <p style="color: #888; text-align: center; padding: 40px;">Selecione uma competição para visualizar os classificados das fases.</p>
  </main>

  <script type="module">
    import { 
      db, 
      auth,
      doc,
      getDoc,
      collection, 
      query, 
      where, 
      getDocs,
      onAuthStateChanged 
    } from "./firebase-config.js";

    const selectCompeticao = document.getElementById("selectCompeticao");
    const containerResultados = document.getElementById("containerResultados");

    let competicaoIdAtual = localStorage.getItem("selectedCompId") || null;
    let dadosCompeticao = null;

    // Proteção de Rota Privada
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        carregarCompeticoesUsuario(user.uid);
      }
    });

    // Carrega eventos do usuário
    async function carregarCompeticoesUsuario(userId) {
      try {
        const q = query(collection(db, "competicoes"), where("userId", "==", userId));
        const snapshot = await getDocs(q);

        selectCompeticao.innerHTML = '<option value="">-- Selecione o Evento --</option>';

        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const option = document.createElement("option");
          option.value = docSnap.id;
          option.textContent = data.nome ? data.nome.toUpperCase() : `EVENTO #${docSnap.id.substring(0,5)}`;
          selectCompeticao.appendChild(option);
        });

        if (competicaoIdAtual) {
          selectCompeticao.value = competicaoIdAtual;
          carregarResultadosFiltrados(competicaoIdAtual);
        }
      } catch (err) {
        console.error("Erro ao carregar eventos:", err);
      }
    }

    selectCompeticao.addEventListener("change", (e) => {
      const compId = e.target.value;
      if (compId) {
        competicaoIdAtual = compId;
        localStorage.setItem("selectedCompId", compId);
        carregarResultadosFiltrados(compId);
      }
    });

    // Função de auxílio para calcular baterias
    function calcularBateria(ordemPista, tamanhoLote, numBaterias) {
      if (!ordemPista || ordemPista <= 0) return 1;
      const qtdBaterias = numBaterias || 2;
      const loteTam = tamanhoLote || 25;
      const indiceLote = Math.floor((ordemPista - 1) / loteTam);
      return (indiceLote % qtdBaterias) + 1;
    }

    async function carregarResultadosFiltrados(compId) {
      containerResultados.innerHTML = '<p style="color: #aaa; text-align: center; padding: 30px;">Processando classificados...</p>';

      try {
        // Busca configurações do Evento
        const docComp = await getDoc(doc(db, "competicoes", compId));
        if (docComp.exists()) {
          dadosCompeticao = docComp.data();
        }

        // Busca trios do evento
        const qTrios = query(collection(db, "trios"), where("competicaoId", "==", compId));
        const triosSnap = await getDocs(qTrios);

        if (triosSnap.empty) {
          containerResultados.innerHTML = '<p style="color: #888; text-align: center; padding: 30px;">Nenhum trio registrado neste evento.</p>';
          return;
        }

        const todosTrios = [];
        triosSnap.forEach(docSnap => todosTrios.push({ id: docSnap.id, ...docSnap.data() }));

        // Agrupa por Categoria -> Fase
        const estrutura = {};
        todosTrios.forEach(trio => {
          const cat = trio.categoria || "Geral";
          const fase = trio.fase || "CLASSIFICACAO";

          if (!estrutura[cat]) estrutura[cat] = {};
          if (!estrutura[cat][fase]) estrutura[cat][fase] = [];

          estrutura[cat][fase].push(trio);
        });

        renderizarFunilClassificados(estrutura);

      } catch (err) {
        console.error("Erro ao carregar filtrados:", err);
        containerResultados.innerHTML = '<p style="color: var(--danger-red); text-align: center;">Erro ao carregar relatórios.</p>';
      }
    }

    function renderizarFunilClassificados(estrutura) {
      containerResultados.innerHTML = "";

      for (const [categoria, fases] of Object.entries(estrutura)) {
        const secCat = document.createElement("section");
        secCat.className = "categoria-secao";

        // Pega configurações específicas da Categoria (Vagas)
        const catConfig = dadosCompeticao?.categorias?.find(c => c.nome === categoria);
        const numBaterias = catConfig ? catConfig.qtdBaterias : 2;
        const tamanhoLote = catConfig ? catConfig.limiteGado : 25;
        const vagasClassificatoria = catConfig ? (catConfig.classificadosLote || catConfig.classificadosPorBateria || 3) : 3;

        let htmlFases = "";

        // 1. PROCESSA CLASSIFICATÓRIA (Filtra apenas os Top N de cada bateria)
        if (fases["CLASSIFICACAO"]) {
          const triosClass = fases["CLASSIFICACAO"];
          const baterias = {};
          for (let i = 1; i <= numBaterias; i++) baterias[i] = [];

          triosClass.forEach(t => {
            const batNum = calcularBateria(t.ordemPista || t.senha, tamanhoLote, numBaterias);
            if (baterias[batNum]) baterias[batNum].push(t);
          });

          let classificadosClassificatoria = [];

          // Pega apenas os top classificados de cada bateria
          for (let b = 1; b <= numBaterias; b++) {
            const triosValidos = baterias[b].filter(t => t.status === "OK" && t.tempo > 0);
            triosValidos.sort((a, b) => a.tempo - b.tempo);
            const topBateria = triosValidos.slice(0, vagasClassificatoria);
            classificadosClassificatoria.push(...topBateria);
          }

          // Ordena no geral pelo tempo
          classificadosClassificatoria.sort((a, b) => a.tempo - b.tempo);

          htmlFases += gerarCardFaseHtml("🎯 CLASSIFICADOS (CLASSIFICATÓRIA)", classificadosClassificatoria, "CLASSIFICADO");
        }

        // 2. PROCESSA SEMIFINAL (Filtra top classificados da Semifinal se houver)
        if (fases["SEMIFINAL"]) {
          const triosSemi = fases["SEMIFINAL"].filter(t => t.status === "OK" && t.tempo > 0);
          triosSemi.sort((a, b) => a.tempo - b.tempo);

          // Se houver final na sequência, podemos considerar o limite das vagas, ou mostrar os melhores que avançaram
          const limiteSemi = catConfig?.vagasFinal || 10; 
          const classificadosSemi = triosSemi.slice(0, limiteSemi);

          htmlFases += gerarCardFaseHtml("🔥 CLASSIFICADOS (SEMIFINAL)", classificadosSemi, "FINALISTA");
        }

        // 3. PROCESSA FINAL (Resultado Final e Pódio dos Campeões)
        if (fases["FINAL"]) {
          const triosFinal = fases["FINAL"].filter(t => t.status === "OK" && t.tempo > 0);
          triosFinal.sort((a, b) => a.tempo - b.tempo);

          htmlFases += gerarCardFaseHtml("👑 RESULTADO DA FINAL (CAMPEÕES)", triosFinal, "CAMPEÃO", true);
        }

        secCat.innerHTML = `
          <div class="categoria-titulo">
            🏆 CATEGORIA: ${categoria.toUpperCase()}
          </div>
          <div class="fases-grid">
            ${htmlFases || '<p style="color:#888;">Sem corridas finalizadas nesta categoria.</p>'}
          </div>
        `;

        containerResultados.appendChild(secCat);
      }
    }

    // Gerador de tabela limpa para cada card de fase
    function gerarCardFaseHtml(titulo, listaTrios, tagTexto, ehFinal = false) {
      let rows = "";

      if (listaTrios.length === 0) {
        rows = '<tr><td colspan="4" style="text-align:center; color:#888;">Nenhum classificado registrado.</td></tr>';
      } else {
        listaTrios.forEach((trio, index) => {
          let classePodio = "";
          let badge = `<span class="badge-classificado">${tagTexto}</span>`;

          if (ehFinal) {
            if (index === 0) { classePodio = "podio-1"; badge = '<span class="badge-campeao">🥇 1º LUGAR</span>'; }
            else if (index === 1) { classePodio = "podio-2"; badge = '<span class="badge-campeao">🥈 2º LUGAR</span>'; }
            else if (index === 2) { classePodio = "podio-3"; badge = '<span class="badge-campeao">🥉 3º LUGAR</span>'; }
          }

          rows += `
            <tr class="${classePodio}">
              <td><strong>#${index + 1}</strong></td>
              <td>#${trio.senha || '--'}</td>
              <td>
                ${trio.integrantes ? trio.integrantes.join(" / ") : "Sem Nomes"}
                <div style="margin-top:2px;">${badge}</div>
              </td>
              <td><strong>${parseFloat(trio.tempo).toFixed(3)}s</strong></td>
            </tr>
          `;
        });
      }

      return `
        <div class="fase-card ${ehFinal ? 'card-final' : ''}">
          <h3><span>${titulo}</span> <small style="font-size:0.75rem; color:#aaa;">${listaTrios.length} Trios</small></h3>
          <table>
            <thead>
              <tr>
                <th>Pos</th>
                <th>Senha</th>
                <th>Integrantes</th>
                <th>Tempo</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }
  </script>
</body>
</html>
