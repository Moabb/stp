<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados Finais - Team Penning</title>
  <script type="module" src="./firebase-config.js"></script>

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --card-bg: #141414;
      --accent-gold: #ffb703;
      --accent-green: #2a9d8f;
      --accent-blue: #0077b6;
      --danger-red: #e76f51;
      --text-light: #f8f9fa;
      --border-color: #282828;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-light); padding: 15px; }

    /* Cabeçalho da Página */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent-gold);
      margin-bottom: 20px;
      background: var(--card-bg);
      padding: 15px 20px;
      border-radius: 8px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      color: var(--accent-gold);
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .select-comp {
      background: #1c1c1c;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    .btn-print {
      background: var(--accent-green);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Modos de Exibição / Seções de Categoria */
    .categoria-secao {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--border-color);
      margin-bottom: 25px;
    }

    .categoria-titulo {
      color: var(--accent-gold);
      font-size: 1.3rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 15px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Grids para Fases (Classificatória, Semifinal, Final) */
    .fases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .fase-card {
      background: #181818;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
      padding: 12px;
    }

    .fase-card h3 {
      color: var(--accent-blue);
      font-size: 1.05rem;
      margin-bottom: 10px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
      text-transform: uppercase;
    }

    /* Tabelas de Resultados */
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
    th { color: var(--accent-gold); background: #121212; }
    tr:nth-child(even) { background-color: #121212; }

    .podio-1 { background-color: rgba(255, 183, 3, 0.2) !important; font-weight: bold; }
    .podio-2 { background-color: rgba(190, 190, 190, 0.15) !important; }
    .podio-3 { background-color: rgba(205, 127, 50, 0.15) !important; }

    .badge-sat { background: var(--danger-red); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    
    /* Layout para Impressão / Relatório */
    @media print {
      body { background: #fff; color: #000; padding: 0; }
      header, .btn-print, .select-comp { display: none !important; }
      .categoria-secao { border: 1px solid #ccc; background: #fff; color: #000; margin-bottom: 10px; }
      .categoria-titulo, th { color: #000; border-color: #000; }
      .fase-card { border: 1px solid #ccc; background: #fff; }
      th, td { border-color: #ddd; color: #000; }
      .podio-1, .podio-2, .podio-3 { background: none !important; }
    }
  </style>
</head>
<body>

  <!-- CABEÇALHO COM SELEÇÃO DE EVENTO -->
  <header>
    <h1 id="txtCompeticaoNome">📊 RESULTADOS FINAIS DAS ETAPAS</h1>
    
    <div class="header-controls">
      <select id="selectCompeticao" class="select-comp">
        <option value="">Carregando eventos...</option>
      </select>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir Relatório</button>
    </div>
  </header>

  <!-- CONTAINER ONDE OS RESULTADOS SERÃO RENDERIZADOS DINAMICAMENTE -->
  <main id="containerResultados">
    <p style="color: #888; text-align: center; padding: 40px;">Selecione uma competição para visualizar os relatórios finais.</p>
  </main>

  <script type="module">
    import { 
      db, 
      auth,
      doc,
      collection, 
      query, 
      where, 
      getDocs,
      onAuthStateChanged 
    } from "./firebase-config.js";

    const selectCompeticao = document.getElementById("selectCompeticao");
    const txtCompeticaoNome = document.getElementById("txtCompeticaoNome");
    const containerResultados = document.getElementById("containerResultados");

    let competicaoIdAtual = localStorage.getItem("selectedCompId") || null;

    // Proteção de Rota Privada
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html"; // Redireciona caso não esteja logado
      } else {
        carregarCompeticoesUsuario(user.uid);
      }
    });

    // Carrega apenas os eventos atrelados ao usuário logado
    async function carregarCompeticoesUsuario(userId) {
      try {
        const q = query(collection(db, "competicoes"), where("userId", "==", userId));
        const snapshot = await getDocs(q);

        selectCompeticao.innerHTML = '<option value="">-- Selecione o Evento --</option>';

        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const option = document.createElement("option");
          option.value = docSnap.id;
          option.textContent = data.nome ? data.nome.toUpperCase() : `EVENTO #${docSnap.id.substring(0,5)}`;
          selectCompeticao.appendChild(option);
        });

        if (competicaoIdAtual) {
          selectCompeticao.value = competicaoIdAtual;
          carregarResultadosCompletos(competicaoIdAtual);
        }
      } catch (err) {
        console.error("Erro ao carregar eventos:", err);
      }
    }

    // Evento de troca no Dropdown
    selectCompeticao.addEventListener("change", (e) => {
      const compId = e.target.value;
      if (compId) {
        competicaoIdAtual = compId;
        localStorage.setItem("selectedCompId", compId);
        carregarResultadosCompletos(compId);
      }
    });

    // Busca e processa todas as categorias e fases do evento selecionado
    async function carregarResultadosCompletos(compId) {
      containerResultados.innerHTML = '<p style="color: #aaa; text-align: center; padding: 30px;">Carregando resultados...</p>';

      try {
        // Busca todos os trios cadastrados nesta competição
        const qTrios = query(collection(db, "trios"), where("competicaoId", "==", compId));
        const triosSnap = await getDocs(qTrios);

        if (triosSnap.empty) {
          containerResultados.innerHTML = '<p style="color: #888; text-align: center; padding: 30px;">Nenhum dado ou trio registrado neste evento.</p>';
          return;
        }

        const todosTrios = [];
        triosSnap.forEach(docSnap => todosTrios.push({ id: docSnap.id, ...docSnap.data() }));

        // Agrupa trios por Categoria -> Fase
        const estrutura = {};

        todosTrios.forEach(trio => {
          const cat = trio.categoria || "Geral";
          const fase = trio.fase || "CLASSIFICACAO";

          if (!estrutura[cat]) estrutura[cat] = {};
          if (!estrutura[cat][fase]) estrutura[cat][fase] = [];

          estrutura[cat][fase].push(trio);
        });

        renderizarRelatorioResultados(estrutura);

      } catch (err) {
        console.error("Erro ao montar resultados:", err);
        containerResultados.innerHTML = '<p style="color: var(--danger-red); text-align: center;">Erro ao carregar dados dos resultados.</p>';
      }
    }

    // Monta a interface estruturada por Categoria e suas Fases
    function renderizarRelatorioResultados(estrutura) {
      containerResultados.innerHTML = "";

      const ordemFases = ["CLASSIFICACAO", "SEMIFINAL", "FINAL"];

      for (const [categoria, fases] of Object.entries(estrutura)) {
        const secCat = document.createElement("section");
        secCat.className = "categoria-secao";

        let htmlFases = "";

        // Ordena as fases conforme fluxo lógico
        const fasesExistentes = Object.keys(fases).sort((a, b) => {
          return ordemFases.indexOf(a) - ordemFases.indexOf(b);
        });

        fasesExistentes.forEach(faseNome => {
          const listaTrios = fases[faseNome];

          // Ordena por menor tempo (Apenas com tempos OK válidos)
          const triosValidos = listaTrios.filter(t => t.status === "OK" && t.tempo > 0);
          const triosSemTempo = listaTrios.filter(t => t.status !== "OK" || !t.tempo);

          triosValidos.sort((a, b) => a.tempo - b.tempo);
          
          const listaFinalFase = [...triosValidos, ...triosSemTempo];

          let tabelaRows = "";

          listaFinalFase.forEach((trio, index) => {
            let tempoStr = "--";
            let classePodio = "";

            if (trio.status === "OK" && trio.tempo > 0) {
              tempoStr = `${parseFloat(trio.tempo).toFixed(3)}s`;
              if (index === 0) classePodio = "podio-1";
              else if (index === 1) classePodio = "podio-2";
              else if (index === 2) classePodio = "podio-3";
            } else if (trio.status === "SAT") {
              tempoStr = '<span class="badge-sat">SAT</span>';
            } else if (trio.status === "DO") {
              tempoStr = '<span class="badge-sat">D.O.</span>';
            }

            tabelaRows += `
              <tr class="${classePodio}">
                <td><strong>#${index + 1}</strong></td>
                <td>#${trio.senha || '--'}</td>
                <td>${trio.integrantes ? trio.integrantes.join(" / ") : "Sem Nomes"}</td>
                <td><strong>${tempoStr}</strong></td>
              </tr>
            `;
          });

          htmlFases += `
            <div class="fase-card">
              <h3>📌 ${faseNome}</h3>
              <table>
                <thead>
                  <tr>
                    <th>Pos</th>
                    <th>Senha</th>
                    <th>Integrantes</th>
                    <th>Tempo</th>
                  </tr>
                </thead>
                <tbody>
                  ${tabelaRows || '<tr><td colspan="4" style="text-align:center; color:#888;">Nenhum dado nesta fase</td></tr>'}
                </tbody>
              </table>
            </div>
          `;
        });

        secCat.innerHTML = `
          <div class="categoria-titulo">
            <span>🏆 CATEGORIA: ${categoria.toUpperCase()}</span>
          </div>
          <div class="fases-grid">
            ${htmlFases}
          </div>
        `;

        containerResultados.appendChild(secCat);
      }
    }
  </script>
</body>
</html>
