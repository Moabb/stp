<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados por Bateria e Final - Team Penning</title>
  <script type="module" src="./firebase-config.js"></script>

  <style>
    :root {
      --bg-dark: #0a0a0a;
      --card-bg: #141414;
      --accent-gold: #ffb703;
      --accent-green: #2a9d8f;
      --accent-blue: #0077b6;
      --danger-red: #e76f51;
      --text-light: #f8f9fa;
      --border-color: #282828;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-light); padding: 15px; }

    /* Cabeçalho */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent-gold);
      margin-bottom: 20px;
      background: var(--card-bg);
      padding: 15px 20px;
      border-radius: 8px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      color: var(--accent-gold);
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .select-comp {
      background: #1c1c1c;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      outline: none;
      cursor: pointer;
    }

    .btn-print {
      background: var(--accent-green);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Seções por Categoria */
    .categoria-secao {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--border-color);
      margin-bottom: 30px;
    }

    .categoria-titulo {
      color: var(--accent-gold);
      font-size: 1.3rem;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    /* Títulos de Fase (Classificatória, Semifinal, Final) */
    .fase-bloco {
      margin-bottom: 25px;
      background: #181818;
      border-radius: 8px;
      padding: 15px;
      border: 1px solid #282828;
    }

    .fase-titulo {
      color: var(--accent-blue);
      font-size: 1.1rem;
      margin-bottom: 12px;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .fase-titulo.final-titulo {
      color: var(--accent-gold);
    }

    /* Grid de Baterias em cada fase */
    .grid-baterias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
    }

    .bateria-card {
      background: #121212;
      border-radius: 6px;
      border: 1px solid #333;
      padding: 12px;
    }

    .bateria-header {
      color: var(--accent-green);
      font-weight: bold;
      font-size: 0.95rem;
      margin-bottom: 8px;
      border-bottom: 1px solid #222;
      padding-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    /* Tabelas */
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; }
    th { color: var(--accent-gold); background: #1c1c1c; }
    tr:nth-child(even) { background-color: #161616; }

    .podio-1 { background-color: rgba(255, 183, 3, 0.25) !important; font-weight: bold; }
    .podio-2 { background-color: rgba(190, 190, 190, 0.18) !important; }
    .podio-3 { background-color: rgba(205, 127, 50, 0.18) !important; }

    .badge-classificado {
      background: var(--accent-green);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .badge-campeao {
      background: var(--accent-gold);
      color: #000;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    /* Impressão */
    @media print {
      body { background: #fff; color: #000; padding: 0; }
      header, .btn-print, .select-comp { display: none !important; }
      .categoria-secao, .fase-bloco, .bateria-card { border: 1px solid #ccc; background: #fff; color: #000; }
      .categoria-titulo, .fase-titulo, th { color: #000; border-color: #000; }
      th, td { border-color: #ddd; color: #000; }
      .podio-1, .podio-2, .podio-3 { background: none !important; }
    }
  </style>
</head>
<body>

  <!-- CABEÇALHO COM SELEÇÃO DE EVENTO -->
  <header>
    <h1 id="txtCompeticaoNome">📊 RESULTADOS DAS BATERIAS E CAMPEÕES</h1>
    
    <div class="header-controls">
      <select id="selectCompeticao" class="select-comp">
        <option value="">Carregando eventos...</option>
      </select>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir Relatório</button>
    </div>
  </header>

  <!-- CONTAINER PRINCIPAL -->
  <main id="containerResultados">
    <p style="color: #888; text-align: center; padding: 40px;">Selecione uma competição para visualizar os relatórios.</p>
  </main>

  <script type="module">
    import { 
      db, 
      auth,
      doc,
      getDoc,
      collection, 
      query, 
      where, 
      getDocs,
      onAuthStateChanged 
    } from "./firebase-config.js";

    const selectCompeticao = document.getElementById("selectCompeticao");
    const containerResultados = document.getElementById("containerResultados");

    let competicaoIdAtual = localStorage.getItem("selectedCompId") || null;
    let dadosCompeticao = null;

    // Proteção de Rota Privada
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        carregarCompeticoesUsuario(user.uid);
      }
    });

    async function carregarCompeticoesUsuario(userId) {
      try {
        const q = query(collection(db, "competicoes"), where("userId", "==", userId));
        const snapshot = await getDocs(q);

        selectCompeticao.innerHTML = '<option value="">-- Selecione o Evento --</option>';

        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const option = document.createElement("option");
          option.value = docSnap.id;
          option.textContent = data.nome ? data.nome.toUpperCase() : `EVENTO #${docSnap.id.substring(0,5)}`;
          selectCompeticao.appendChild(option);
        });

        if (competicaoIdAtual) {
          selectCompeticao.value = competicaoIdAtual;
          carregarResultadosBaterias(competicaoIdAtual);
        }
      } catch (err) {
        console.error("Erro ao carregar eventos:", err);
      }
    }

    selectCompeticao.addEventListener("change", (e) => {
      const compId = e.target.value;
      if (compId) {
        competicaoIdAtual = compId;
        localStorage.setItem("selectedCompId", compId);
        carregarResultadosBaterias(compId);
      }
    });

    function calcularBateria(ordemPista, tamanhoLote, numBaterias) {
      if (!ordemPista || ordemPista <= 0) return 1;
      const qtdBaterias = numBaterias || 2;
      const loteTam = tamanhoLote || 25;
      const indiceLote = Math.floor((ordemPista - 1) / loteTam);
      return (indiceLote % qtdBaterias) + 1;
    }

    async function carregarResultadosBaterias(compId) {
      containerResultados.innerHTML = '<p style="color: #aaa; text-align: center; padding: 30px;">Processando baterias e finalistas...</p>';

      try {
        const docComp = await getDoc(doc(db, "competicoes", compId));
        if (docComp.exists()) dadosCompeticao = docComp.data();

        const qTrios = query(collection(db, "trios"), where("competicaoId", "==", compId));
        const triosSnap = await getDocs(qTrios);

        if (triosSnap.empty) {
          containerResultados.innerHTML = '<p style="color: #888; text-align: center; padding: 30px;">Nenhum trio encontrado para esta competição.</p>';
          return;
        }

        const todosTrios = [];
        triosSnap.forEach(docSnap => todosTrios.push({ id: docSnap.id, ...docSnap.data() }));

        // Agrupa por Categoria -> Fase
        const estrutura = {};
        todosTrios.forEach(trio => {
          const cat = trio.categoria || "Geral";
          const fase = trio.fase || "CLASSIFICACAO";

          if (!estrutura[cat]) estrutura[cat] = {};
          if (!estrutura[cat][fase]) estrutura[cat][fase] = [];

          estrutura[cat][fase].push(trio);
        });

        renderizarBateriasEFinal(estrutura);

      } catch (err) {
        console.error("Erro ao carregar resultados por bateria:", err);
        containerResultados.innerHTML = '<p style="color: var(--danger-red); text-align: center;">Erro ao carregar os dados.</p>';
      }
    }

    function renderizarBateriasEFinal(estrutura) {
      containerResultados.innerHTML = "";

      for (const [categoria, fases] of Object.entries(estrutura)) {
        const secCat = document.createElement("section");
        secCat.className = "categoria-secao";

        const catConfig = dadosCompeticao?.categorias?.find(c => c.nome === categoria);
        const numBaterias = catConfig ? catConfig.qtdBaterias : 2;
        const tamanhoLote = catConfig ? catConfig.limiteGado : 25;
        const vagasClassificatoria = catConfig ? (catConfig.classificadosLote || catConfig.classificadosPorBateria || 3) : 3;

        let htmlConteudoCategoria = "";

        // 1. CLASSIFICATÓRIA SEPARADA POR BATERIAS
        if (fases["CLASSIFICACAO"]) {
          htmlConteudoCategoria += renderizarBlocoFaseBaterias(
            "🎯 CLASSIFICATÓRIA - CLASSIFICADOS POR BATERIA",
            fases["CLASSIFICACAO"],
            numBaterias,
            tamanhoLote,
            vagasClassificatoria,
            "CLASSIFICADO"
          );
        }

        // 2. SEMIFINAL SEPARADA POR BATERIAS
        if (fases["SEMIFINAL"]) {
          const vagasSemi = catConfig?.vagasSemifinalPorBateria || vagasClassificatoria;
          htmlConteudoCategoria += renderizarBlocoFaseBaterias(
            "🔥 SEMIFINAL - CLASSIFICADOS POR BATERIA",
            fases["SEMIFINAL"],
            numBaterias,
            tamanhoLote,
            vagasSemi,
            "FINALISTA"
          );
        }

        // 3. FINAL (RANKING GERAL DOS CAMPEÕES)
        if (fases["FINAL"]) {
          const triosFinal = fases["FINAL"].filter(t => t.status === "OK" && t.tempo > 0);
          triosFinal.sort((a, b) => a.tempo - b.tempo);

          let rowsFinal = "";
          if (triosFinal.length === 0) {
            rowsFinal = '<tr><td colspan="4" style="text-align:center; color:#888;">Aguardando encerramento da final.</td></tr>';
          } else {
            triosFinal.forEach((trio, idx) => {
              let classePodio = "";
              let badge = '<span class="badge-campeao">FINALISTA</span>';

              if (idx === 0) { classePodio = "podio-1"; badge = '<span class="badge-campeao">🥇 CAMPEÃO (1º)</span>'; }
              else if (idx === 1) { classePodio = "podio-2"; badge = '<span class="badge-campeao">🥈 VICE-CAMPEÃO (2º)</span>'; }
              else if (idx === 2) { classePodio = "podio-3"; badge = '<span class="badge-campeao">🥉 3º LUGAR</span>'; }

              rowsFinal += `
                <tr class="${classePodio}">
                  <td><strong>#${idx + 1}</strong></td>
                  <td>#${trio.senha || '--'}</td>
                  <td>
                    ${trio.integrantes ? trio.integrantes.join(" / ") : "Sem Nomes"}
                    <div style="margin-top:2px;">${badge}</div>
                  </td>
                  <td><strong>${parseFloat(trio.tempo).toFixed(3)}s</strong></td>
                </tr>
              `;
            });
          }

          htmlConteudoCategoria += `
            <div class="fase-bloco">
              <div class="fase-titulo final-titulo">👑 RESULTADO DA FINAL (CAMPEÕES DA ETAPA)</div>
              <table>
                <thead>
                  <tr>
                    <th>Pos</th>
                    <th>Senha</th>
                    <th>Integrantes</th>
                    <th>Tempo Final</th>
                  </tr>
                </thead>
                <tbody>${rowsFinal}</tbody>
              </table>
            </div>
          `;
        }

        secCat.innerHTML = `
          <div class="categoria-titulo">🏆 CATEGORIA: ${categoria.toUpperCase()}</div>
          ${htmlConteudoCategoria || '<p style="color:#888;">Sem corridas finalizadas nesta categoria.</p>'}
        `;

        containerResultados.appendChild(secCat);
      }
    }

    // Auxiliar para gerar o bloco de baterias (Bateria 1, Bateria 2...)
    function renderizarBlocoFaseBaterias(tituloFase, triosFase, numBaterias, tamanhoLote, vagas, tagTexto) {
      const baterias = {};
      for (let i = 1; i <= numBaterias; i++) baterias[i] = [];

      triosFase.forEach(t => {
        const batNum = calcularBateria(t.ordemPista || t.senha, tamanhoLote, numBaterias);
        if (baterias[batNum]) baterias[batNum].push(t);
      });

      let htmlBateriasGrid = "";

      for (let b = 1; b <= numBaterias; b++) {
        const triosValidos = baterias[b].filter(t => t.status === "OK" && t.tempo > 0);
        triosValidos.sort((a, b) => a.tempo - b.tempo);

        const classificadosBateria = triosValidos.slice(0, vagas);

        let rows = "";
        if (classificadosBateria.length === 0) {
          rows = '<tr><td colspan="3" style="text-align:center; color:#888;">Nenhum classificado</td></tr>';
        } else {
          classificadosBateria.forEach((trio, idx) => {
            rows += `
              <tr>
                <td><strong>#${idx + 1}</strong></td>
                <td>
                  ${trio.integrantes ? trio.integrantes.join(" / ") : ""}
                  <div><span class="badge-classificado">${tagTexto}</span></div>
                </td>
                <td><strong>${parseFloat(trio.tempo).toFixed(3)}s</strong></td>
              </tr>
            `;
          });
        }

        htmlBateriasGrid += `
          <div class="bateria-card">
            <div class="bateria-header">
              <span>BATERIA ${b}</span>
              <small style="color:#aaa;">${classificadosBateria.length} Classificados</small>
            </div>
            <table>
              <thead>
                <tr><th>Pos</th><th>Trio</th><th>Tempo</th></tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }

      return `
        <div class="fase-bloco">
          <div class="fase-titulo">${tituloFase}</div>
          <div class="grid-baterias">
            ${htmlBateriasGrid}
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
