<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Provas - Team Penning</title>
  <script type="module" src="./firebase-config.js"></script>
  <style>
    :root {
      --bg-dark: #121212;
      --card-bg: #1e1e1e;
      --accent-gold: #ffb703;
      --accent-green: #2a9d8f;
      --accent-blue: #0077b6;
      --text-light: #f8f9fa;
      --input-bg: #2b2b2b;
      --border-color: #333;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-light); padding: 20px; }

    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 25px; }
    header h1 { color: var(--accent-gold); font-size: 1.6rem; text-transform: uppercase; }

    .btn-action { background: var(--accent-gold); color: #000; font-weight: bold; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
    .btn-action:hover { opacity: 0.9; }
    .btn-danger { background: #e76f51; color: #fff; }
    .btn-secondary { background: #555; color: #fff; }
    .btn-fase { background: var(--accent-blue); color: #fff; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }

    .grid-config { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; align-items: start; }
    @media (max-width: 900px) { .grid-config { grid-template-columns: 1fr; } }

    .secao-card { background: var(--card-bg); border-radius: 8px; padding: 25px; border: 1px solid var(--border-color); }
    .secao-card h2 { color: var(--accent-gold); font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }

    .fases-nav { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.85rem; color: #ccc; margin-bottom: 5px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid #444; border-radius: 4px; color: #fff; }

    .categoria-box { background: #262626; border: 1px solid #444; border-radius: 6px; padding: 15px; margin-bottom: 12px; position: relative; }
    .categoria-box .btn-remover { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: #e76f51; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    
    .grid-cat-inputs { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 10px; }
    @media (max-width: 600px) { .grid-cat-inputs { grid-template-columns: 1fr; } }

    .btn-add-cat { background: transparent; border: 1px dashed var(--accent-gold); color: var(--accent-gold); width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
    .btn-add-cat:hover { background: rgba(255, 183, 3, 0.1); }

    .btn-salvar { width: 100%; padding: 12px; background: var(--accent-green); color: #fff; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .btn-salvar:disabled { background: #555; cursor: not-allowed; }

    .lista-provas { display: flex; flex-direction: column; gap: 12px; }
    .card-prova-item { background: #262626; border-radius: 6px; padding: 15px; border-left: 4px solid var(--accent-gold); display: flex; flex-direction: column; gap: 15px; }
    .card-prova-item .top-info { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card-prova-item .info h3 { font-size: 1.1rem; color: #fff; margin-bottom: 4px; }
    .card-prova-item .info p { font-size: 0.85rem; color: #aaa; }
    .card-prova-item .acoes { display: flex; gap: 6px; flex-wrap: wrap; }
    
    /* BLOCO EMBUTIDO INTEGRADO */
    .box-categoria-embutida { background: #141414; padding: 12px; border-radius: 6px; border: 1px solid #333; }
    .box-categoria-embutida h4 { color: var(--accent-gold); font-size: 0.9rem; margin-bottom: 8px; }
    .form-embutida-inline { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .form-embutida-inline select { flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; min-width: 140px; }
    .btn-vincular-emb { background: var(--accent-green); color: #fff; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn-vincular-emb:hover { opacity: 0.9; }

    .fixar { position: sticky; top: 20px; align-self: start; }
  </style>
</head>
<body>

  <header>
    <h1>⚙️ CONFIGURAÇÃO DE COMPETIÇÕES</h1>
    <div>
      <button class="btn-action" onclick="window.location.href='./cadastro.html'">📝 CADASTRAR TRIOS</button>
      <button class="btn-action" id="btnIrAdmin">⏱️ IR PARA PROVA (ADMIN)</button>
      <button class="btn-action btn-danger" id="btnSair">SAIR</button>
    </div>
  </header>

  <main class="grid-config">
    
    <section class="secao-card fixar">
      <h2 id="tituloForm">CRIAR NOVA COMPETIÇÃO</h2>
      <form id="formCompeticao">
        
        <div class="form-group">
          <label for="nomeComp">Nome Principal da Competição / Evento:</label>
          <input type="text" id="nomeComp" placeholder="Ex: 1º Grande Team Penning de Uberaba" required>
        </div>

        <div class="form-group">
          <label for="dataComp">Data de Início do Evento:</label>
          <input type="date" id="dataComp" required>
        </div>

        <h3 style="font-size: 1rem; color: #ccc; margin: 15px 0 10px 0;">Categorias da Prova:</h3>
        
        <div id="containerCategorias"></div>

        <button type="button" class="btn-add-cat" id="btnAddCategoria">+ Adicionar Categoria</button>
        
        <div style="display: flex; gap: 10px;">
          <button type="submit" class="btn-salvar" id="btnSalvarComp">Salvar e Criar Competição</button>
          <button type="button" class="btn-action btn-secondary" id="btnCancelarEdicao" style="display: none;">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="secao-card">
      <h2>MINHAS COMPETIÇÕES CADASTRADAS</h2>
      
      <div class="fases-nav">
        <button class="btn-action btn-fase" onclick="window.location.href='./semifinais.html'">🔥 Semifinais</button>
        <button class="btn-action btn-fase" onclick="window.location.href='./final.html'">🏆 Final</button>
      </div>

      <div class="lista-provas" id="listaProvas">
        <p style="color: #888;">Carregando competições...</p>
      </div>
    </section>

  </main>

  <script type="module">
    import { 
      auth, 
      db, 
      collection, 
      addDoc, 
      getDocs, 
      doc,
      updateDoc,
      query, 
      where, 
      onAuthStateChanged,
      signOut 
    } from "./firebase-config.js";

    let currentUser = null;
    let modoEdicaoId = null;
    let competicoesCache = {};

    const containerCategorias = document.getElementById("containerCategorias");
    const btnAddCategoria = document.getElementById("btnAddCategoria");
    const btnSalvarComp = document.getElementById("btnSalvarComp");
    const btnCancelarEdicao = document.getElementById("btnCancelarEdicao");
    const tituloForm = document.getElementById("tituloForm");

    function adicionarCampoCategoria(nome = "", dataCat = "", baterias = 2, classificados = 10) {
      const dataPadrao = dataCat || document.getElementById("dataComp").value || new Date().toISOString().split('T')[0];

      const div = document.createElement("div");
      div.className = "categoria-box";
      
      div.innerHTML = `
        <button type="button" class="btn-remover" title="Remover Categoria">✕</button>
        <div class="grid-cat-inputs">
          <div class="form-group" style="margin:0;">
            <label>Nome Categoria</label>
            <input type="text" class="cat-nome" placeholder="Ex: Soma 3" value="${nome}" required>
          </div>
          <div class="form-group" style="margin:0;">
            <label>Data Prova</label>
            <input type="date" class="cat-data" value="${dataPadrao}" required>
          </div>
          <div class="form-group" style="margin:0;">
            <label>Nº Baterias</label>
            <input type="number" class="cat-baterias" min="1" value="${baterias}" required>
          </div>
          <div class="form-group" style="margin:0;">
            <label>Classif./Bat.</label>
            <input type="number" class="cat-classificados" min="1" value="${classificados}" required>
          </div>
        </div>
      `;

      div.querySelector(".btn-remover").addEventListener("click", () => {
        div.remove();
      });

      containerCategorias.appendChild(div);
    }

    btnAddCategoria.addEventListener("click", () => adicionarCampoCategoria());

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "./index.html";
        return;
      }
      currentUser = user;
      carregarCompeticoes();
    });

    document.getElementById("formCompeticao").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nomeComp = document.getElementById("nomeComp").value.trim();
      const dataComp = document.getElementById("dataComp").value;

      const blocosCategorias = containerCategorias.querySelectorAll(".categoria-box");
      if (blocosCategorias.length === 0) {
        alert("Por favor, adicione pelo menos uma categoria para a competição.");
        return;
      }

      const categorias = [];
      blocosCategorias.forEach(bloco => {
        categorias.push({
          nome: bloco.querySelector(".cat-nome").value.trim(),
          data: bloco.querySelector(".cat-data").value,
          qtdBaterias: parseInt(bloco.querySelector(".cat-baterias").value) || 1,
          classificadosPorBateria: parseInt(bloco.querySelector(".cat-classificados").value) || 1
        });
      });

      try {
        btnSalvarComp.disabled = true;
        btnSalvarComp.innerText = "Salvando...";

        if (modoEdicaoId) {
          const compRef = doc(db, "competicoes", modoEdicaoId);
          await updateDoc(compRef, {
            nome: nomeComp,
            dataInicio: dataComp,
            categorias: categorias,
            atualizadoEm: new Date()
          });
          alert("Competição e categorias atualizadas com sucesso!");
        } else {
          await addDoc(collection(db, "competicoes"), {
            organizadorId: currentUser.uid,
            nome: nomeComp,
            dataInicio: dataComp,
            categorias: categorias,
            criadoEm: new Date(),
            status: "ATIVA"
          });
          alert("Competição criada com sucesso!");
        }

        resetarFormulario();
        carregarCompeticoes();

      } catch (error) {
        console.error("Erro no Firestore:", error);
        alert("Erro ao salvar no banco de dados: " + error.message);
      } finally {
        btnSalvarComp.disabled = false;
      }
    });

    function resetarFormulario() {
      modoEdicaoId = null;
      document.getElementById("formCompeticao").reset();
      containerCategorias.innerHTML = "";
      tituloForm.innerText = "CRIAR NOVA COMPETIÇÃO";
      btnSalvarComp.innerText = "Salvar e Criar Competição";
      btnCancelarEdicao.style.display = "none";
      adicionarCampoCategoria();
    }

    btnCancelarEdicao.addEventListener("click", resetarFormulario);

    async function carregarCompeticoes() {
      const listaProvas = document.getElementById("listaProvas");
      listaProvas.innerHTML = "<p style='color:#888;'>Carregando competições...</p>";

      try {
        const q = query(
          collection(db, "competicoes"), 
          where("organizadorId", "==", currentUser.uid)
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          listaProvas.innerHTML = "<p style='color:#888;'>Nenhuma competição cadastrada ainda.</p>";
          return;
        }

        competicoesCache = {};
        listaProvas.innerHTML = "";

        snapshot.forEach(docSnap => {
          const comp = docSnap.data();
          const compId = docSnap.id;
          competicoesCache[compId] = comp;

          const card = document.createElement("div");
          card.className = "card-prova-item";
          
          const detalhesCat = comp.categorias && comp.categorias.length > 0
            ? comp.categorias.map(c => `${c.nome} (${c.data || comp.dataInicio})`).join(" | ")
            : "Nenhuma categoria";

          // Monta options de categoria dinamicamente
          let optionsCategorias = `<option value="">Selecione...</option>`;
          if (comp.categorias && comp.categorias.length > 0) {
            comp.categorias.forEach((cat) => {
              optionsCategorias += `<option value="${cat.nome}">${cat.nome}</option>`;
            });
          }

          // Exibe se já existir vinculo de categoria embutida salvo no documento da competição
          const infoVinculo = comp.vinculoEmbutido 
            ? `<p style="font-size:0.8rem; color:#2a9d8f; margin-top:5px;"><strong>Vínculo Ativo:</strong> ${comp.vinculoEmbutido.catPai} ➔ ${comp.vinculoEmbutido.catEspelho}</p>`
            : '';

          card.innerHTML = `
            <div class="top-info">
              <div class="info">
                <h3>${comp.nome}</h3>
                <p>Início: ${comp.dataInicio} | Categorias: ${detalhesCat}</p>
              </div>
              <div class="acoes">
                <button class="btn-action btnEditar" data-id="${compId}">✏️ Editar / Add Categoria</button>
                <button class="btn-action btnInscritos" data-id="${compId}">📝 Iniciar Cadastrar Trios</button>
              </div>
            </div>

            <hr style="border-color: #333; margin: 0;">

            <!-- BLOCO DE CATEGORIA EMBUTIDA (DINÂMICO) -->
            <div class="box-categoria-embutida">
              <h4>🔗 Vincular Categoria Embutida (Espelho)</h4>
              <div class="form-embutida-inline">
                <select id="selectCatPai_${compId}">
                  <option value="">Categoria Principal (Pista)</option>
                  ${optionsCategorias}
                </select>

                <span style="color: #888;">➔</span>

                <select id="selectCatEspelho_${compId}">
                  <option value="">Categoria Embutida (Recebe Tempos)</option>
                  ${optionsCategorias}
                </select>

                <button class="btn-vincular-emb btnVincular" data-id="${compId}">
                  Vincular
                </button>
              </div>
              ${infoVinculo}
            </div>
          `;

          card.querySelector(".btnEditar").addEventListener("click", () => carregarParaEdicao(compId));
          card.querySelector(".btnInscritos").addEventListener("click", () => irParaCadastro(compId));
          card.querySelector(".btnVincular").addEventListener("click", () => vincularCategoriaEmbutida(compId));

          // Preenche os selects caso já existam valores salvos
          if (comp.vinculoEmbutido) {
            setTimeout(() => {
              const selPai = document.getElementById(`selectCatPai_${compId}`);
              const selEsp = document.getElementById(`selectCatEspelho_${compId}`);
              if (selPai) selPai.value = comp.vinculoEmbutido.catPai || "";
              if (selEsp) selEsp.value = comp.vinculoEmbutido.catEspelho || "";
            }, 50);
          }

          listaProvas.appendChild(card);
        });
      } catch (error) {
        console.error("Erro ao carregar:", error);
        listaProvas.innerHTML = "<p style='color:#e76f51;'>Erro ao carregar competições.</p>";
      }
    }

    async function vincularCategoriaEmbutida(compId) {
      const selectPai = document.getElementById(`selectCatPai_${compId}`);
      const selectEspelho = document.getElementById(`selectCatEspelho_${compId}`);

      const catPai = selectPai ? selectPai.value : "";
      const catEspelho = selectEspelho ? selectEspelho.value : "";

      if (!catPai || !catEspelho) {
        alert("Por favor, selecione tanto a Categoria Principal quanto a Categoria Embutida.");
        return;
      }

      if (catPai === catEspelho) {
        alert("A Categoria Principal e a Categoria Embutida não podem ser a mesma!");
        return;
      }

      try {
        const compRef = doc(db, "competicoes", compId);
        await updateDoc(compRef, {
          vinculoEmbutido: {
            catPai: catPai,
            catEspelho: catEspelho,
            vinculadoEm: new Date()
          }
        });

        alert(`Vínculo realizado com sucesso!\n\nCategoria Principal (Pista): ${catPai}\nCategoria Embutida (Espelho): ${catEspelho}`);
        carregarCompeticoes();
      } catch (error) {
        console.error("Erro ao vincular categorias:", error);
        alert("Erro ao salvar o vínculo no banco de dados: " + error.message);
      }
    }

    function carregarParaEdicao(compId) {
      const comp = competicoesCache[compId];
      if (!comp) return;

      modoEdicaoId = compId;
      tituloForm.innerText = "EDITAR COMPETIÇÃO / ADICIONAR CATEGORIA";
      btnSalvarComp.innerText = "Atualizar Competição";
      btnCancelarEdicao.style.display = "inline-block";

      document.getElementById("nomeComp").value = comp.nome || "";
      document.getElementById("dataComp").value = comp.dataInicio || "";

      containerCategorias.innerHTML = "";

      if (comp.categorias && comp.categorias.length > 0) {
        comp.categorias.forEach(cat => {
          adicionarCampoCategoria(
            cat.nome,
            cat.data || comp.dataInicio,
            cat.qtdBaterias || 2,
            cat.classificadosPorBateria || 10
          );
        });
      } else {
        adicionarCampoCategoria();
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function irParaCadastro(compId) {
      localStorage.setItem("selectedCompId", compId);
      window.location.href = "./cadastro.html";
    }

    document.getElementById("btnIrAdmin").addEventListener("click", () => {
      window.location.href = "./admin.html";
    });

    document.getElementById("btnSair").addEventListener("click", () => {
      signOut(auth).then(() => window.location.href = "./index.html");
    });

    adicionarCampoCategoria();
  </script>
</body>
</html>
