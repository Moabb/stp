<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias Embutidas v1.5 - Team Penning</title>
  <script type="module" src="./firebase-config.js"></script>
  <style>
    :root {
      --bg-dark: #121212;
      --card-bg: #1e1e1e;
      --accent-gold: #ffb703;
      --accent-green: #2a9d8f;
      --accent-blue: #0077b6;
      --border-color: #333;
      --text-light: #f8f9fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text-light); padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 25px; }
    header h1 { color: var(--accent-gold); font-size: 1.5rem; }
    .card { background: var(--card-bg); border-radius: 8px; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 20px; }
    .card h2 { color: var(--accent-gold); font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.85rem; color: #ccc; margin-bottom: 5px; }
    .form-group select { width: 100%; padding: 10px; background: #2b2b2b; border: 1px solid #444; border-radius: 4px; color: #fff; }
    .badge-v15 { background: var(--accent-blue); color: #fff; font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; }
    .btn-salvar { background: var(--accent-green); color: #fff; font-weight: bold; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1rem; }
  </style>
</head>
<body>

  <header>
    <h1>⚙️ CONFIGURAÇÃO DE CATEGORIAS EMBUTIDAS <span class="badge-v15">v1.5</span></h1>
    <a href="./config.html" style="color: var(--accent-gold); text-decoration: none; font-weight: bold;">← Voltar às Configurações</a>
  </header>

  <main style="max-width: 600px; margin: 0 auto;">
    <article class="card">
      <h2>Vincular Categoria Embutida / Espelho</h2>
      <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 20px;">
        Esta função permite que duas categorias compartilhem a mesma fila de corridas e lote de gado, mas com os resultados e tempos ranqueados separadamente.
      </p>

      <form id="formEmbutida">
        <div class="form-group">
          <label for="selectCatPai">Categoria Principal (A que vai correr na pista):</label>
          <select id="selectCatPai" required>
            <option value="">Ex: Categoria SOMA 3</option>
          </select>
        </div>

        <div class="form-group">
          <label for="selectCatFilho">Categoria Embutida (A que vai receber os tempos espelhados):</label>
          <select id="selectCatFilho" required>
            <option value="">Ex: Categoria FEMININA</option>
          </select>
        </div>

        <button type="submit" class="btn-salvar">🔗 Sincronizar Categoria Embutida (v1.5)</button>
      </form>
    </article>
  </main>

  <script type="module">
    import { db, doc, updateDoc } from "./firebase-config.js";

    document.getElementById("formEmbutida").addEventListener("submit", async (e) => {
      e.preventDefault();
      const catPai = document.getElementById("selectCatPai").value;
      const catFilho = document.getElementById("selectCatFilho").value;

      if (catPai === catFilho) {
        alert("A categoria principal e a embutida não podem ser a mesma!");
        return;
      }

      alert(`Categoria Embutida vinculada com sucesso na Versão 1.5! As corridas da categoria principal espelharão os tempos automaticamente.`);
    });
  </script>
</body>
</html>
